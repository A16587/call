<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>مساعد العيادة الذكي</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Cairo",sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#e6f4f7,#cfe8ef);
display:flex;
flex-direction:column;
align-items:center;
}

/* HEADER */

.header{
margin-top:35px;
font-size:26px;
color:#0b5d6b;
font-weight:bold;
}

/* CHAT */

.chat-container{
flex:1;
width:100%;
max-width:800px;
display:flex;
flex-direction:column;
justify-content:flex-end;
padding:20px;
}

.messages{
width:100%;
display:flex;
flex-direction:column;
gap:10px;
margin-bottom:110px;
}

/* MESSAGE */

.message{
max-width:70%;
padding:14px 18px;
border-radius:18px;
font-size:16px;
background:#2fa4b7;
color:white;
align-self:flex-end;
line-height:1.6;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* SUGGESTIONS */

.suggestions{
position:fixed;
bottom:95px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
width:90%;
max-width:700px;
}

.suggestion{
border:2px solid #7ec7d8;
padding:9px 16px;
border-radius:30px;
cursor:pointer;
background:rgba(255,255,255,0.7);
color:#0b5d6b;
font-size:14px;
}

.suggestion:hover{
background:#7ec7d8;
color:white;
}

/* FLOATING DOCK */

.input-dock{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:700px;
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
padding:10px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
display:flex;
gap:10px;
align-items:flex-end;
}

/* TEXTAREA */

textarea{
flex:1;
border:none;
outline:none;
resize:none;
background:transparent;
font-size:16px;
padding:10px;
max-height:120px;
line-height:1.5;
overflow-y:auto;
}

/* BUTTONS */

.btn{
width:45px;
height:45px;
border:none;
border-radius:50%;
cursor:pointer;
font-size:18px;
display:flex;
align-items:center;
justify-content:center;
}

.send-btn{
background:#2fa4b7;
color:white;
}

.mic-btn{
background:#f1f1f1;
}

.mic-btn.recording{
background:red;
color:white;
}

</style>
</head>

<body>

<div class="header">مساعد العيادة الذكي</div>

<div class="chat-container">

<div class="messages" id="messages"></div>

</div>

<div class="suggestions">
<div class="suggestion">حجز موعد</div>
<div class="suggestion">مواعيد العيادة</div>
<div class="suggestion">أسعار الكشف</div>
<div class="suggestion">الأعراض</div>
<div class="suggestion">الأدوية</div>
<div class="suggestion">التحاليل المطلوبة</div>
</div>

<!-- DOCK -->

<div class="input-dock">

<button class="btn mic-btn" id="micBtn">🎤</button>

<textarea
id="userInput"
rows="1"
placeholder="اكتب سؤالك..."
></textarea>

<button class="btn send-btn" onclick="sendMessage()">➤</button>

</div>

<script>

/* AUTO EXPAND TEXTAREA */

const textarea = document.getElementById("userInput")

textarea.addEventListener("input",()=>{

textarea.style.height="auto"
textarea.style.height=textarea.scrollHeight+"px"

})

/* SEND MESSAGE */

function sendMessage(){

let text=textarea.value.trim()

if(text==="") return

let messages=document.getElementById("messages")

let msg=document.createElement("div")

msg.className="message"

msg.innerText=text

messages.appendChild(msg)

textarea.value=""
textarea.style.height="auto"

messages.scrollTop=messages.scrollHeight

}

/* SUGGESTIONS */

document.querySelectorAll(".suggestion").forEach(btn=>{
btn.onclick=()=>{
textarea.value=btn.innerText
textarea.focus()
}
})

/* VOICE */

let micBtn=document.getElementById("micBtn")

const SpeechRecognition =
window.SpeechRecognition ||
window.webkitSpeechRecognition

const recognition = new SpeechRecognition()

recognition.lang="ar-EG"
recognition.interimResults=true
recognition.continuous=true

let recording=false

micBtn.onclick=()=>{

if(!recording){

recognition.start()
micBtn.classList.add("recording")
recording=true

}else{

recording=false
recognition.stop()
micBtn.classList.remove("recording")

}

}

recognition.onresult=function(event){

let transcript=""

for(let i=0;i<event.results.length;i++){
transcript+=event.results[i][0].transcript
}

textarea.value=transcript

}

recognition.onend=function(){

if(recording){
recognition.start()
}

}

</script>

</body>
</html>
